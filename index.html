<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/contact/favicon.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Contact • Felipe Antunes</title>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 antialiased flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-gray-100">
      <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
        <span class="text-sm font-semibold tracking-tight text-gray-900">Felipe Antunes</span>
        <a
          href="https://feantuns.github.io/home/"
          class="text-xs font-medium text-indigo-600 hover:text-indigo-700 transition-colors"
        >
          ← Portfolio
        </a>
      </div>
    </header>

    <!-- Main -->
    <main class="py-16 flex-1">
      <div class="max-w-4xl mx-auto px-6">
        <section class="space-y-8">

          <!-- Hero -->
          <div class="flex items-center gap-5">
            <div class="relative flex-shrink-0">
              <div class="absolute inset-0 rounded-full bg-indigo-100 scale-110"></div>
              <img
                src="./avatar.jpg"
                alt="Felipe Antunes"
                class="relative w-20 h-20 rounded-full object-cover shadow-md ring-4 ring-white"
                loading="eager"
              />
            </div>
            <div>
              <h1 class="text-4xl font-bold tracking-tight text-gray-900">Felipe Antunes</h1>
              <p class="mt-1 text-lg text-indigo-600 font-medium">Front-End Developer · Building with React &amp; AI</p>
            </div>
          </div>

          <!-- Contact links -->
          <div class="space-y-3 pt-2">
            <a
              href="https://www.linkedin.com/in/feantuns/"
              target="_blank"
              rel="noreferrer"
              class="flex items-center gap-3 w-full px-5 py-3 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-colors shadow-sm"
            >
              <span class="text-lg" aria-hidden="true">💼</span> LinkedIn
            </a>
            <a
              href="https://www.instagram.com/fe.antune5/"
              target="_blank"
              rel="noreferrer"
              class="flex items-center gap-3 w-full px-5 py-3 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-colors shadow-sm"
            >
              <span class="text-lg" aria-hidden="true">📸</span> Instagram
            </a>
            <a
              href="mailto:sermoes-vimes91@icloud.com"
              class="flex items-center gap-3 w-full px-5 py-3 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-colors shadow-sm"
            >
              <span class="text-lg" aria-hidden="true">✉️</span> Email
            </a>
            <a
              href="https://github.com/feantuns"
              target="_blank"
              rel="noreferrer"
              class="flex items-center gap-3 w-full px-5 py-3 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-colors shadow-sm"
            >
              <span class="text-lg" aria-hidden="true">💻</span> GitHub
            </a>
          </div>

        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-100 bg-white">
      <div class="max-w-4xl mx-auto px-6 py-6 flex items-center justify-between text-xs text-gray-400">
        <span>© <span id="year"></span> Felipe Antunes</span>
        <a
          href="https://feantuns.github.io/home/"
          class="hover:text-gray-600 transition-colors underline underline-offset-2"
        >
          Portfolio
        </a>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
